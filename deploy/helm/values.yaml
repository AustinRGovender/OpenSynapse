replicaCount: 1

controlPlane:
  image:
    repository: ghcr.io/opensynapse/control-plane
    tag: latest
    pullPolicy: IfNotPresent
  port: 8090
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

web:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/opensynapse/web
    tag: latest
    pullPolicy: IfNotPresent
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  port: 5432
  database: opensynapse
  username: opensynapse
  password: opensynapse
  storage: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

minio:
  enabled: true
  image:
    repository: minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  port: 9000
  consolePort: 9001
  accessKey: minioadmin
  secretKey: minioadmin
  bucket: opensynapse
  storage: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

k6Operator:
  enabled: false

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: opensynapse.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

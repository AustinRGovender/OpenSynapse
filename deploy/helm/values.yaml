replicaCount: 1

controlPlane:
  image:
    repository: ghcr.io/opensynapse/control-plane
    tag: latest
    pullPolicy: IfNotPresent
  port: 8090
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

web:
  image:
    repository: ghcr.io/opensynapse/web
    tag: latest
    pullPolicy: IfNotPresent
  port: 8080

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: opensynapse.local
      paths:
        - path: /
          pathType: Prefix

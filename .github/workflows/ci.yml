name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  go:
    name: Go (control plane)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/control-plane
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -count=1

      - name: Vet
        run: go vet ./...

  web:
    name: Web (React SPA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter web build

      - name: Lint
        run: pnpm --filter web lint

  helm:
    name: Helm (chart validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint deploy/helm/

      - name: Template chart
        run: helm template test-release deploy/helm/

  docker:
    name: Docker (image build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build control-plane image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.control-plane
          push: false
          tags: opensynapse/control-plane:ci

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.web
          push: false
          tags: opensynapse/web:ci

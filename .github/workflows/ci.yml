name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  go:
    name: Go (control plane)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/control-plane
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -count=1

      - name: Vet
        run: go vet ./...

  web:
    name: Web (React SPA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter web build

      - name: Lint
        run: pnpm --filter web lint

  helm:
    name: Helm (chart validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint deploy/helm/

      - name: Template chart
        run: helm template test-release deploy/helm/

  docker:
    name: Docker (image build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build control-plane image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.control-plane
          push: false
          load: true
          tags: opensynapse/control-plane:ci

      # Guard against ADR-0007 regressions: the control-plane image MUST ship
      # a k6 binary on PATH with the xk6-kv extension baked in, otherwise
      # /runs returns ENGINE_NOT_AVAILABLE and live control cannot work.
      - name: Verify bundled k6 and xk6-kv
        run: |
          set -euo pipefail
          docker run --rm --entrypoint k6 opensynapse/control-plane:ci version > k6-version.txt
          cat k6-version.txt
          grep -q "xk6-kv" k6-version.txt || {
            echo "::error::k6 binary in control-plane image is missing the xk6-kv extension (see docs/decisions/0007-k6-xk6-kv-bundled-in-control-plane-image.md)"
            exit 1
          }

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.web
          push: false
          tags: opensynapse/web:ci
